<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Acidhelp.com — Emergency help for acid attack survivors in Pakistan</title>

<!-- Map library (loaded from CDN — needs internet for the Nearby Hospitals map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<!-- Fonts (loaded from CDN — needs internet for custom typefaces) -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;900&family=Lexend:wght@400;500;600;700;900&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0B0F1C; --surface:#141924; --card:#1C2337;
    --border:#252E45; --borderLight:#2E3850;
    --red:#FF3B30; --redDark:#B02820; --redDim:rgba(255,59,48,0.14);
    --green:#00C853; --greenDim:rgba(0,200,83,0.14);
    --blue:#0A84FF; --blueDim:rgba(10,132,255,0.14);
    --purple:#BF5AF2; --purpleDim:rgba(191,90,242,0.14);
    --warn:#FF911C; --warnDim:rgba(255,145,28,0.2);
    --teal:#30D5C8; --tealDim:rgba(48,213,200,0.14);
    --text:#F0F3FA; --sub:#7A8BA0; --muted:#38465A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);min-height:100vh}
  a{color:inherit;text-decoration:none}
  input,textarea,select,button{font-family:inherit}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
  .leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}70%{box-shadow:0 0 0 14px rgba(255,59,48,0)}}
  .sc1{animation:fadeUp .4s .10s both}.sc2{animation:fadeUp .4s .22s both}.sc3{animation:fadeUp .4s .34s both}

  /* ── Resources card interactions ───────────────────────────────────── */
  .res-photo{
    position:absolute;inset:0;
    background-size:cover;
    transition:transform .7s cubic-bezier(.22,1,.36,1), filter .5s ease;
    will-change:transform;
  }
  .res-card-wrap{cursor:pointer;transition:box-shadow .35s ease}
  .res-card-wrap:hover .res-photo{transform:scale(1.06);filter:brightness(1.08)}
  .res-card-wrap:hover{box-shadow:0 12px 40px rgba(0,0,0,.35)}
  .res-arrow{transition:transform .3s cubic-bezier(.22,1,.36,1)}
  .res-card-wrap:not(.is-open):hover .res-arrow{transform:translateX(6px)}

  @keyframes dropdownOpen{
    0%   {opacity:0;max-height:0;   transform:translateY(-8px);margin-top:0}
    35%  {opacity:.4}
    100% {opacity:1;max-height:1600px;transform:translateY(0);margin-top:10px}
  }
  .res-dropdown{
    overflow:hidden;
    animation:dropdownOpen .55s cubic-bezier(.22,1,.36,1) both;
  }

  #map-overlays{position:absolute;inset:0;pointer-events:none}
  #map-overlays > *{pointer-events:auto}

  .nav-scroll{display:flex;gap:22px;align-items:center;overflow-x:auto;scrollbar-width:none}
  .nav-scroll::-webkit-scrollbar{display:none}

  /* ── CTA hover interactions ─────────────────────────────────────────── */
  .cta-btn{transition:transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease, filter .25s ease}
  .cta-btn:hover{transform:translateY(-3px) scale(1.035);filter:brightness(1.1)}
  .cta-btn:active{transform:translateY(-1px) scale(1.01);filter:brightness(1)}

  .nav-tab-btn{transition:color .2s ease, transform .2s ease, border-color .2s ease}
  .nav-tab-btn:hover{color:#fff!important;transform:translateY(-1px)}

  .lang-btn{transition:transform .2s ease, border-color .2s ease, background-color .2s ease}
  .lang-btn:hover{transform:translateY(-1px);border-color:var(--borderLight)!important}

  .logo-btn{transition:transform .2s ease}
  .logo-btn:hover{transform:scale(1.03)}

  .footer-link{display:inline-block;transition:transform .2s ease, opacity .2s ease}
  .footer-link:hover{transform:translateY(-2px);opacity:.8}

  .phone-pill{display:inline-block;transition:transform .2s ease, filter .2s ease}
  .phone-pill:hover{transform:translateY(-2px) scale(1.04);filter:brightness(1.15)}

  .text-link-alt{transition:opacity .2s ease, text-decoration-thickness .2s ease}
  .text-link-alt:hover{opacity:1}

  .icon-btn{transition:transform .2s ease, background-color .2s ease}
  .icon-btn:hover{transform:scale(1.12);background:var(--borderLight)!important}

  .join-tab-btn{cursor:pointer;transition:transform .2s ease, border-color .2s ease, color .2s ease}
  .join-tab-btn:not(.is-active):hover{transform:translateY(-1px);border-color:var(--borderLight)!important;color:var(--text)!important}

  /* ── Scroll reveal: sections rise into place as they enter view ──────── */
  .reveal{opacity:0;transform:translateY(32px);transition:opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1);will-change:opacity,transform}
  .reveal.is-visible{opacity:1;transform:translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

</style>
</head>

function haversine(la1,lo1,la2,lo2){
  const R=6371,d=x=>x*Math.PI/180;
  const a=Math.sin(d(la2-la1)/2)**2+Math.cos(d(la1))*Math.cos(d(la2))*Math.sin(d(lo2-lo1)/2)**2;
  return +(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

  if(s==="Surgical")return C.blue;
  return C.sub;
}

function mountMap(){
  const loadingEl = document.getElementById("map-loading");
  const init = ()=>{
    const el = document.getElementById("map");
    if(!el || !window.L) return;
    if(loadingEl) loadingEl.style.display="none";
    const L = window.L;
    const map = L.map(el,{ center:[30.4,69.4], zoom:5, zoomControl:false });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);
    L.control.zoom({ position:"topright" }).addTo(map);
    mapState.map = map;
    HOSPITALS.forEach(h=>{
      const col = sColor(h.specialty);
      const icon = L.divIcon({
        className:"",
        html:`<div style="width:42px;height:42px;background:${col};border-radius:50%;border:3px solid white;box-shadow:0 3px 14px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;">${h.icon}</div>`,
        iconSize:[42,42], iconAnchor:[21,21],
      });
      L.marker([h.lat,h.lng],{icon}).addTo(map).on("click",()=>{
        mapState.selected = h;
        map.setView([h.lat,h.lng], Math.max(map.getZoom(),13), {animate:true});
        renderMapOverlays();
      });
    });
    renderMapOverlays();
  };
  if(window.L){ init(); return; }
  const existing = document.querySelector('script[data-leaflet]');
  if(!existing){
    const js = document.createElement("script");
    js.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    js.setAttribute("data-leaflet","1");
    js.onload = init;
    document.head.appendChild(js);
  } else {
    existing.addEventListener("load", init);
  }
}

            <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
              <span style="font-size:17px;flex-shrink:0">❌</span>
              <div style="font-size:13.5px;font-weight:600;color:#E8A0A0;font-style:italic;line-height:1.45;font-family:${BODY_FF}">${m.myth}</div>

              <span style="font-size:17px;flex-shrink:0">✅</span>
              <div style="font-size:13.5px;color:${C.text};line-height:1.6;font-family:${BODY_FF}">${m.fact}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>
  </section>`;
}

// ── ABOUT PAGE ─────────────────────────────────────────────────────────────────

        <div style="font-family:${t.hff};font-weight:900;font-size:clamp(28px,3.4vw,40px);letter-spacing:-1px;color:${C.text}">${t.abtTitle}</div>
        <div style="font-family:${BODY_FF};font-size:15px;color:${C.sub};margin-top:10px;line-height:1.7;max-width:72ch">${t.abtMission}</div>
      </div>
    </div>

    <!-- Advocacy -->
    <div class="reveal" data-reveal-id="abt-advocacy" style="max-width:1308px;margin:24px auto 36px;padding:0 clamp(16px,3vw,32px)">
      <div style="background:${C.redDim};border:1.5px solid rgba(255,59,48,0.3);border-radius:16px;padding:20px">
        <div style="font-size:15px;font-weight:900;color:${C.red};margin-bottom:8px;font-family:${t.hff}">🎗 ${t.advocacyTitle}</div>
        <div style="font-size:13.5px;color:#E8A0A0;line-height:1.65;font-family:${BODY_FF}">${t.advocacy}</div>
      </div>
    </div>

    <!-- Join us / partner form -->
    <div class="reveal" data-reveal-id="abt-join" style="max-width:1308px;margin:0 auto 40px;padding:0 clamp(16px,3vw,32px);text-align:center">

      <div style="font-size:13px;color:${C.sub};margin-bottom:14px;line-height:1.4;font-family:${BODY_FF}">${t.conSub}</div>
      <div style="max-width:640px;width:100%;margin:0 auto;text-align:start">${joinUsForm(t)}</div>

// Two audiences, one form shell: a survivor requesting help, or a volunteer/org
// offering it. Each tab keeps its own draft + submitted state so switching
// between them never loses what's been typed.
function joinUsForm(t){
  const isSurvivor = state.joinTab==="survivor";
  const data = isSurvivor ? state.survivorForm : state.volunteerForm;
  const submitted = isSurvivor ? state.survivorSubmitted : state.volunteerSubmitted;
  const fourthKey = isSurvivor ? "help" : "role";
  const fourthLabel = isSurvivor ? t.helpLabel : t.roleLabel;
  const fourthOptions = isSurvivor ? t.helpOptions : t.orgTypes;
  const submitLabel = isSurvivor ? t.survivorSubmitLabel : t.submitLabel;
  const submittedMsg = isSurvivor ? t.survivorSubmittedMsg : t.submittedMsg;
  const inputStyle = `width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid ${C.border};font-size:14px;background:${C.bg};color:${C.text};outline:none;font-family:${BODY_FF}`;
  const labelStyle = `font-size:12px;font-weight:700;color:${C.sub};display:block;margin-bottom:7px;font-family:${BODY_FF}`;
  const tabStyle = active=>`flex:1;padding:12px 16px;border-radius:14px;border:1.5px solid ${active?C.red:C.border};background:${active?C.red:"transparent"};color:${active?"#fff":C.sub};font-weight:700;font-size:14px;font-family:${BODY_FF}`;

  const tabs = `<div style="display:flex;gap:10px;margin-bottom:18px">
      <button onclick="setJoinTab('survivor')" class="join-tab-btn${isSurvivor?" is-active":""}" style="${tabStyle(isSurvivor)}">${t.survivorTab}</button>
      <button onclick="setJoinTab('volunteer')" class="join-tab-btn${!isSurvivor?" is-active":""}" style="${tabStyle(!isSurvivor)}">${t.volunteerTab}</button>
    </div>`;

  if(submitted){
    return tabs + `<div style="text-align:center;padding:56px 24px;background:${C.greenDim};border:1.5px solid ${C.green};border-radius:24px">
        <div style="font-size:52px">✅</div>
        <div style="font-size:18px;font-weight:700;color:${C.green};margin-top:14px;font-family:${BODY_FF}">${submittedMsg}</div>
      </div>`;
  }
  return tabs + `<div style="background:${C.card};border-radius:24px;padding:28px 24px;border:1px solid ${C.border};display:flex;flex-direction:column;gap:18px">
      <div>
        <label style="${labelStyle}">${t.nameLabel}</label>
        <input value="${esc(data.name)}" oninput="updateJoinForm('name', this.value)" style="${inputStyle}">
      </div>
      <div>
        <label style="${labelStyle}">${t.phoneLabel}</label>
        <input type="tel" value="${esc(data.phone)}" oninput="updateJoinForm('phone', this.value)" style="${inputStyle}">
      </div>
      <div>
        <label style="${labelStyle}">${t.emailLabel}</label>
        <input type="email" value="${esc(data.email)}" oninput="updateJoinForm('email', this.value)" style="${inputStyle}">
      </div>
      <div>
        <label style="${labelStyle}">${fourthLabel}</label>
        <select onchange="updateJoinForm('${fourthKey}', this.value)" style="${inputStyle}">
          <option value=""${data[fourthKey]===""?" selected":""}>—</option>
          ${fourthOptions.map(o=>`<option value="${esc(o)}"${data[fourthKey]===o?" selected":""}>${o}</option>`).join("")}
        </select>
      </div>
      <button onclick="submitJoinForm()" class="cta-btn" style="background:${C.red};color:white;border:none;padding:16px;border-radius:32px;font-size:16px;font-weight:900;font-family:${BODY_FF};cursor:pointer;letter-spacing:-0.3px">${submitLabel}</button>
    </div>`;
}

function initCounters(){
  const duration = 1800;
  document.querySelectorAll(".stat-counter").forEach(el=>{
    const target = +el.dataset.target;
    const suffix = el.dataset.suffix || "";
    const prefix = el.dataset.prefix || "";
    const obs = new IntersectionObserver(([e])=>{
      if(!e.isIntersecting) return;
      obs.disconnect();
      let start=null;
      const step = ts=>{
        if(!start) start=ts;
        const p = Math.min((ts-start)/duration,1);
        el.textContent = prefix + Math.floor(p*target).toLocaleString() + suffix;
        if(p<1) requestAnimationFrame(step);
        else el.textContent = prefix + target.toLocaleString() + suffix;
      };
      requestAnimationFrame(step);
    },{ threshold:0.4 });
    obs.observe(el);
  });
}

// Sections rise into place once, the first time they enter view; re-renders
// triggered by clicks (toggling a card, submitting the form, etc.) don't replay it.
function initReveals(){
  document.querySelectorAll(".reveal").forEach(el=>{
    const id = el.dataset.revealId;
    if(id && revealedSections.has(id)){ el.classList.add("is-visible"); return; }
    const obs = new IntersectionObserver(([e])=>{
      if(!e.isIntersecting) return;
      el.classList.add("is-visible");
      if(id) revealedSections.add(id);
      obs.disconnect();
    },{ threshold:0.15 });
    obs.observe(el);
  });
}

// ── SHELL / RENDER ────────────────────────────────────────────────────────────
function render(){
  const t = T[state.lang];
  const root = document.getElementById("root");
  root.setAttribute("dir", t.dir);
  root.style.fontFamily = t.ff;
  root.style.minHeight = "100vh";
  root.style.background = C.bg;
  root.style.color = C.text;

  // HEADER — logo · nav tabs (Figma) · language · 1122 pill
  const header = `<header style="position:sticky;top:0;z-index:1200;background:${C.surface};border-bottom:1px solid ${C.border}">
    <div style="max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:11px 16px 12px">
      <div onclick="setPage('emergency')" class="logo-btn" style="cursor:pointer;display:flex;align-items:center;gap:9px;flex-shrink:0">
        ${logoMark(26)}
        <span style="font-family:${HEAD_FF};font-weight:900;font-size:24px;letter-spacing:-1px;line-height:1"><span style="color:${C.red}">Acid</span><span style="color:#fff">help</span></span>
      </div>
      <nav class="nav-scroll" style="flex:1;justify-content:center;min-width:0">
        ${[1,2,3].map(i=>{  /* Figma order: Nearby · Resources · About — Emergency is the landing page (logo) */
          const label = t.navItems[i];
          const active = state.page===t.pages[i];
          return `<button onclick="setPage('${t.pages[i]}')" class="nav-tab-btn" style="background:none;border:none;cursor:pointer;padding:6px 2px;font-family:${BODY_FF};font-weight:${active?600:400};font-size:16px;letter-spacing:-0.5px;color:${active?"#fff":"rgba(240,243,250,.72)"};border-bottom:2px solid ${active?C.red:"transparent"};white-space:nowrap">${label}</button>`;
        }).join("")}
      </nav>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div style="display:flex;gap:4px">
          ${["en","ur","ro","ps"].map(l=>{
            const active = state.lang===l;
            const ff = (l==="ur"||l==="ps") ? "'Noto Nastaliq Urdu',sans-serif" : BODY_FF;
            return `<button onclick="setLang('${l}')" class="lang-btn" style="background:${active?C.card:"transparent"};color:${active?"#fff":C.sub};border:1px solid ${active?C.borderLight:"transparent"};border-radius:16px;padding:3px 9px;font-size:${(l==="ur"||l==="ps")?12:10.5}px;font-weight:${active?700:500};cursor:pointer;font-family:${ff}">${T[l].name}</button>`;
          }).join("")}
        </div>
        <a href="tel:1122" class="cta-btn" style="background:${C.red};border-radius:32px;padding:6px 12px;display:inline-flex;align-items:center;gap:4px">
          ${phoneSVG(17,"#fff")}
          <span style="color:#fff;font-family:${HEAD_FF};font-weight:700;font-size:17px;letter-spacing:-0.5px">1122</span>
        </a>
      </div>
    </div>
  </header>`;

  let body = "";
  if(state.page==="emergency") body = emergencyPage(t);
  else if(state.page==="medical") body = mapPage();
  else if(state.page==="resources") body = resourcesPage(t);
  else if(state.page==="about") body = aboutPage(t);

  root.innerHTML = header + `<main>${body}</main>`;

  if(state.page==="medical") mountMap();
  if(state.page==="emergency") initCounters();
  initReveals();
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function setLang(l){ state.lang = l; render(); }
function setPage(p){
  if(state.page==="medical" && p!=="medical" && mapState.map){
    mapState.map.remove(); mapState.map=null; mapState.userMarker=null;
    mapState.selected=null; mapState.nearbyList=[]; mapState.loading=false; mapState.locError=null;
  }
  state.page = p;
  if(p!=="resources") openCard = null;
  revealedSections.clear();
  render();
  window.scrollTo(0,0);
}
function toggleCard(i){ openCard = (openCard===i) ? null : i; render(); }
function setJoinTab(tab){ state.joinTab = tab; render(); }
function updateJoinForm(key,val){
  (state.joinTab==="survivor" ? state.survivorForm : state.volunteerForm)[key] = val;
}
function submitJoinForm(){
  const isSurvivor = state.joinTab==="survivor";
  const data = isSurvivor ? state.survivorForm : state.volunteerForm;
  if(!data.name || !data.email) return;
  if(isSurvivor) state.survivorSubmitted = true; else state.volunteerSubmitted = true;
  render();
}

function selectHospital(id){
  const h = HOSPITALS.find(x=>x.id===id);
  if(!h) return;
  mapState.selected = h;
  if(mapState.map) mapState.map.setView([h.lat,h.lng],14,{animate:true});
  renderMapOverlays();
}
function closeSheet(){ mapState.selected = null; renderMapOverlays(); }
function clearError(){ mapState.locError = null; renderMapOverlays(); }

function nearMe(){
  mapState.locError = null;
  if(!navigator.geolocation){ mapState.locError = "Geolocation not supported."; renderMapOverlays(); return; }
  mapState.loading = true;
  renderMapOverlays();
  navigator.geolocation.getCurrentPosition(
    ({coords:{latitude:lat,longitude:lng}})=>{
      mapState.loading = false;
      const L = window.L, map = mapState.map;
      if(map){
        if(mapState.userMarker) mapState.userMarker.remove();
        mapState.userMarker = L.marker([lat,lng],{
          icon:L.divIcon({className:"",html:`<div style="width:18px;height:18px;background:${C.red};border-radius:50%;border:3px solid white;box-shadow:0 0 0 6px rgba(255,59,48,0.22);"></div>`,iconSize:[18,18],iconAnchor:[9,9]})
        }).addTo(map);
      }
      const sorted = HOSPITALS.map(h=>({...h,dist:haversine(lat,lng,h.lat,h.lng)})).sort((a,b)=>a.dist-b.dist);
      mapState.nearbyList = sorted.slice(0,5);
      mapState.selected = sorted[0];
      if(map) map.flyTo([sorted[0].lat,sorted[0].lng],13,{duration:1.6});
      renderMapOverlays();
    },
    ()=>{ mapState.loading=false; mapState.locError="Location access denied. Allow it in browser settings."; renderMapOverlays(); },
    {timeout:12000}
  );
}

// Boot
render();

</script>
